<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Ground Grid -->
  <g stroke="#cfd5df" stroke-width="1" opacity="0.6">
    <line x1="0" y1="90" x2="200" y2="90" />
    <line x1="0" y1="100" x2="200" y2="100" />
    <line x1="0" y1="110" x2="200" y2="110" />
    
    <line x1="40" y1="90" x2="20" y2="120" />
    <line x1="80" y1="90" x2="60" y2="120" />
    <line x1="120" y1="90" x2="140" y2="120" />
    <line x1="160" y1="90" x2="180" y2="120" />
    <line x1="100" y1="90" x2="100" y2="120" />
  </g>

  <!-- Mannequin / Avatar silhouette -->
  <g fill="#949aa5" filter="url(#shadow)">
    <!-- Head -->
    <circle cx="100" cy="30" r="10" />
    <!-- Torso -->
    <path d="M 90 44 Q 100 40 110 44 L 106 65 Q 100 68 94 65 Z" />
    <!-- Upper Arms -->
    <path d="M 88 45 L 76 56 L 80 60 L 92 49 Z" />
    <path d="M 112 45 L 124 56 L 120 60 L 108 49 Z" />
    <!-- Lower Arms -->
    <path d="M 76 56 L 70 70 L 74 72 L 80 60 Z" />
    <path d="M 124 56 L 130 70 L 126 72 L 120 60 Z" />
    <!-- Upper Legs -->
    <path d="M 94 67 L 90 85 L 96 87 L 100 70 Z" />
    <path d="M 106 67 L 110 85 L 104 87 L 100 70 Z" />
    <!-- Lower Legs -->
    <path d="M 90 85 L 88 105 L 94 105 L 96 87 Z" />
    <path d="M 110 85 L 112 105 L 106 105 L 104 87 Z" />
  </g>
</svg>
